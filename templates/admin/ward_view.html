{% load static %}
{% include 'admin/header.html' %}
                <!-- ============================================================== -->
                <!-- pageheader  -->
                <!-- ============================================================== -->
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                        <div class="page-header">
                            <h2 class="pageheader-title">Ward View Management</h2>
                            <div class="page-breadcrumb">
                               
                            </div>
                        </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end pageheader  -->
                <!-- ============================================================== -->

                <!-- Filter Section -->
                <div class="row mb-4">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-5">
                                        <label for="taluk_filter" style="font-weight: 600;">Filter by Taluk:</label>
                                        <select id="taluk_filter" class="form-control" style="border: 2px solid #e1e1e1;">
                                            <option value="">-- All Taluks --</option>
                                            {% for t in taluks %}
                                            <option value="{{ t.TalukID }}">{{ t.TalukName }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-5">
                                        <label for="localbody_filter" style="font-weight: 600;"> Local Body :</label>
                                        <select id="localbody_filter" class="form-control" style="border: 2px solid #e1e1e1;">
                                            <option value="">-- Select Local Body --</option>
                                        </select>
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <button id="filter_btn" class="btn btn-primary w-100" style="height: 38px;">
                                            <i class="fa fa-filter"></i> Filter
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table Section -->
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                                <div class="card">
                                    <h5 class="card-header">WARD</h5>
                                    <div class="card-body p-0">
                                        <div class="table-responsive">
                                            <table class="table">
                                                <thead class="bg-light">
                                                    <tr class="border-0">
                                                        <th class="border-0">#</th>
                                                        <th class="border-0">Ward Number</th>
                                                        <th class="border-0">Local Body</th>
                                                        <th class="border-0">Taluk</th>
                        
                                                    </tr>
                                                </thead>
                                                <tbody id="ward_table_body">
                                                    {% for w in wards %}
                                                    <tr>
                                                        <td>{{ forloop.counter }}</td>
                                                        <td>{{ w.WardNumber }}</td>
                                                        <td>{{ w.LocalbodyID.LocalbodyName }}</td>
                                                        <td>{{ w.LocalbodyID.TalukId.TalukName }}</td>
                                                        <td>
                                                            <div class="d-flex align-items-center">
                                                            <a href="{% url 'editward' wid=w.WardID %}">
                                                             <button type="button" class="btn btn-success btn-sm btn-icon-text">
                                                             Edit
                                                            </button>
                                                            </a>
                                                            <a href="{% url 'deleteward' wid=w.WardID %}" onclick="return confirm('Are you sure you want to delete this ward?');">
                                                             <button type="button" class="btn btn-danger btn-sm btn-icon-text">
                                                             Delete
                                                            <i class="typcn typcn-delete-outline btn-icon-append"></i>                          
                                                            </button>
                                                            </a>
                                                 </div>
                                                         </td>
                                                         </tr>
                                                    {% endfor %}
                                                       
                                                        </tbody>
                                                      </table>
                                        </div>
                                    </div>
                                </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end table  -->
                <!-- ============================================================== -->

<script>
const talukSelect = document.getElementById('taluk_filter');
const localbodySelect = document.getElementById('localbody_filter');

talukSelect.addEventListener('change', function() {
    const talukId = this.value;
    localbodySelect.innerHTML = '<option value="">-- Select Local Body --</option>';

    if (!talukId) return;

    fetch(`{% url 'localbodies_by_taluk' %}?taluk_id=${talukId}`)
        .then(res => res.json())
        .then(data => {
            data.forEach(lb => {
                const opt = document.createElement('option');
                opt.value = lb.LocalbodyID;
                opt.textContent = lb.LocalbodyName;
                localbodySelect.appendChild(opt);
            });
        })
        .catch(err => console.error('Error loading local bodies:', err));
});

document.getElementById('filter_btn').addEventListener('click', function() {
    const talukId = talukSelect.value;
    const localbodyId = localbodySelect.value;
    
    let url = "{% url 'filter_ward' %}?";
    if (talukId) url += `taluk_id=${talukId}`;
    if (localbodyId) url += (talukId ? '&' : '') + `localbody_id=${localbodyId}`;
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('ward_table_body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center">No wards found</td></tr>';
                return;
            }
            
            data.forEach((w, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${w.WardNumber}</td>
                    <td>${w.LocalbodyName}</td>
                    <td>${w.TalukName}</td>
                `;
                tbody.appendChild(row);
            });
        })
        .catch(error => console.error('Error:', error));
});
</script>

{% include 'admin/footer.html' %}
