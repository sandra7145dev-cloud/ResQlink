{% load static %}
{% include 'admin/header.html' %}
                <!-- ============================================================== -->
                <!-- pageheader  -->
                <!-- ============================================================== -->
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                        <div class="page-header">
                            <h2 class="pageheader-title">Edit Sub Category</h2>
                            <div class="page-breadcrumb">
                                <nav aria-label="breadcrumb">
                                    <ol class="breadcrumb">
                                        <li class="breadcrumb-item"><a href="/adminapp/adminhome/" class="breadcrumb-btn">Dashboard</a></li>
                                        <li class="breadcrumb-item"><a href="/adminapp/viewsubcategory/" class="breadcrumb-btn">Sub Category</a></li>
                                        <li class="breadcrumb-item active" aria-current="page">Edit Sub Category</li>
                                    </ol>
                                </nav>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end pageheader  -->
                <!-- ============================================================== -->
                <div class="row">
                    <div class="col-lg-6 mx-auto">
                        <div class="card">
                            <h5 class="card-header">Edit Sub Category</h5>
                            <div class="card-body">
                                <form method="POST">
                                    {% csrf_token %}
                                    <div class="form-group">
                                        <label for="subcategoryname">Sub Category Name *</label>
                                        <input type="text" class="form-control" id="subcategoryname" name="subcategoryname" value="{{ subcategory.SubCategoryname }}" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="categoryid">Category *</label>
                                        <select class="form-control" id="categoryid" name="categoryid" required>
                                            <option value="">-- Select Category --</option>
                                            {% for c in categories %}
                                            <option value="{{ c.CategoryID }}" {% if c.CategoryID == subcategory.categoryID.CategoryID %}selected{% endif %}>{{ c.CategoryName }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                   
                                    <div class="form-group">
                                        <button type="submit" class="btn btn-primary">Update</button>
                                        <a href="/adminapp/viewsubcategory/" class="btn btn-secondary">Cancel</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end form  -->
                <!-- ============================================================== -->
{% include 'admin/footer.html' %}
