{% load static %}
{% include 'admin/header.html' %}
                <!-- ============================================================== -->
                <!-- pageheader  -->
                <!-- ============================================================== -->
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                        <div class="page-header">
                            <h2 class="pageheader-title">Local Body Management</h2>
                            <div class="page-breadcrumb">
                               
                            </div>
                        </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end pageheader  -->
                <!-- ============================================================== -->

                <!-- Filter Section -->
                <div class="row mb-4">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-5">
                                        <label for="taluk_filter" style="font-weight: 600;">Filter by Taluk:</label>
                                        <select id="taluk_filter" class="form-control" style="border: 2px solid #e1e1e1;">
                                            <option value="">-- All Taluks --</option>
                                            {% for t in taluks %}
                                            <option value="{{ t.TalukID }}">{{ t.TalukName }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-5">
                                        <label for="type_filter" style="font-weight: 600;">Filter by Local Body Type:</label>
                                        <select id="type_filter" class="form-control" style="border: 2px solid #e1e1e1;">
                                            <option value="">-- All Types --</option>
                                            {% for lt in localbody_types %}
                                            <option value="{{ lt.TypeID }}">{{ lt.TypeName }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="col-md-2 d-flex align-items-end">
                                        <button id="filter_btn" class="btn btn-primary w-100" style="height: 38px;">
                                            <i class="fa fa-filter"></i> Filter
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Table Section -->
                <div class="row">
                    <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12 col-12">
                                <div class="card">
                                    <h5 class="card-header">Local Bodies</h5>
                                    <div class="card-body p-0">
                                        <div class="table-responsive">
                                            <table class="table">
                                                <thead class="bg-light">
                                                    <tr class="border-0">
                                                        <th class="border-0">#</th>
                                                        <th class="border-0">Local Body Name</th>
                                                        <th class="border-0">Type</th>
                                                        <th class="border-0">Taluk</th>
                                                        <th class="border-0">Actions</th>
                        
                                                    </tr>
                                                </thead>
                                                <tbody id="localbody_table_body">
                                                    {% for lb in localbodies %}
                                                    <tr>
                                                        <td>{{ forloop.counter }}</td>
                                                        <td>{{ lb.LocalbodyName }}</td>
                                                        <td>{{ lb.TypeID.TypeName }}</td>
                                                        <td>{{ lb.TalukId.TalukName }}</td>
                                                        <td>
                                                            <div class="d-flex align-items-center">
                                                            <a href="{% url 'editlocalbody' id=lb.LocalbodyID %}">
                                                             <button type="button" class="btn btn-success btn-sm btn-icon-text">
                                                             Edit
                                                            </button>
                                                            </a>
                                                            <a href="{% url 'deletelocalbody' id=lb.LocalbodyID %}" onclick="return confirm('Are you sure you want to delete this local body?');">
                                                             <button type="button" class="btn btn-danger btn-sm btn-icon-text">
                                                             Delete
                                                            <i class="typcn typcn-delete-outline btn-icon-append"></i>                          
                                                            </button>
                                                            </a>
                                                 </div>
                                                         </td>
                                                         </tr>
                                                    {% endfor %}
                                                       
                                                        </tbody>
                                                      </table>
                                        </div>
                                    </div>
                                </div>
                    </div>
                </div>
                <!-- ============================================================== -->
                <!-- end table  -->
                <!-- ============================================================== -->

<script>
document.getElementById('filter_btn').addEventListener('click', function() {
    const talukId = document.getElementById('taluk_filter').value;
    const typeId = document.getElementById('type_filter').value;
    
    let url = "{% url 'filter_localbody' %}?";
    if (talukId) url += "taluk_id=" + talukId;
    if (typeId) url += (talukId ? "&" : "") + "type_id=" + typeId;
    
    fetch(url)
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('localbody_table_body');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">No local bodies found</td></tr>';
                return;
            }
            
            data.forEach((lb, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${lb.LocalbodyName}</td>
                    <td>${lb.TypeName}</td>
                    <td>${lb.TalukName}</td>
                    <td>
                        <div class="d-flex align-items-center">
                        <a href="/adminapp/editlocalbody/${lb.LocalbodyID}/">
                         <button type="button" class="btn btn-success btn-sm btn-icon-text">
                         Edit
                        </button>
                        </a>
                        <a href="/adminapp/deletelocalbody/${lb.LocalbodyID}/" onclick="return confirm('Are you sure?');">
                         <button type="button" class="btn btn-danger btn-sm btn-icon-text">
                         Delete
                        </button>
                        </a>
                     </div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        })
        .catch(error => console.error('Error:', error));
});
</script>

{% include 'admin/footer.html' %}
