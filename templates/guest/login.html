<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ResQ Disaster Management</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f4c75; /* Deep Professional Blue */
            --accent-color: #3282b8;  /* Lighter Blue */
            --alert-color: #e94560;   /* Urgent Red */
            --bg-color: #f0f2f5;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border-top: 5px solid var(--primary-color);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .logo-icon {
            position: relative;
            margin-right: 12px;
        }

        .logo-icon .fa-map-marker {
            font-size: 40px;
            color: var(--primary-color);
        }

        .logo-icon .fa-plus {
            font-size: 16px;
            color: var(--white);
            position: absolute;
            top: 8px;
            left: 11px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 1px;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #555;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e1e1e1;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 2.3rem;
            cursor: pointer;
            color: #888;
        }

        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .btn-login:hover {
            background-color: var(--accent-color);
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .links a {
            color: var(--primary-color);
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .public-access {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-container {
                box-shadow: none;
                background: transparent;
                border: none;
            }
            body {
                background: var(--white);
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header">
            <div class="header-logo">
                <div class="logo-icon">
                    <i class="fa fa-map-marker"></i>
                    <i class="fa fa-plus"></i>
                </div>
                <span class="logo-text">ResQlink</span>
            </div>
            <p>Disaster Resource Management</p>
        </div>

        {% if error %}
        <div style="background-color: #ffebee; color: #c62828; padding: 12px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #c62828;">
            <i class="fas fa-exclamation-circle"></i> {{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div style="background-color: #e8f5e9; color: #2e7d32; padding: 12px; border-radius: 6px; margin-bottom: 20px; border-left: 4px solid #2e7d32;">
            <i class="fas fa-check-circle"></i> {{ success }}
        </div>
        {% endif %}

        <form id="loginForm" method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">UserName</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <i class="fas fa-eye password-toggle" id="togglePassword"></i>
            </div>

            <button type="submit" class="btn-login">Secure Login</button>

            <div class="links">
                <a href="{% url 'forgot_password' %}">Forgot Password?</a>
                <a href="{% url 'ngo_vol_sel' %}">New User? Register Here</a>
            </div>
        </form>

        <div class="public-access">
            <p>Rapid Response for Every Crisis</p>
        </div>
    </div>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye slash icon
            this.classList.toggle('fa-eye-slash');
        });

        // Form submission handled by Django backend
    </script>
</body>
</html>
